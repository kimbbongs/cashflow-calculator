name: Auto Update Product Data

on:
  workflow_dispatch:
  schedule:
    - cron: "20 0 * * *"

permissions:
  contents: write

jobs:
  update-product-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas

      - name: Update products JSON
        run: python scripts/update_product_data.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- assets/products.json; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/products.json
          git commit -m "chore: auto-update product data"
          git push
